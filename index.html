<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #38bdf8; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
    .card { background: #1e293b; border-radius: 16px; padding: 2rem; width: 100%; max-width: 600px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .stat { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #334155; }
    .stat:last-child { border-bottom: none; }
    .label { color: #94a3b8; font-size: 0.9rem; }
    .value { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
    .badge { background: #0ea5e9; color: #fff; padding: 2px 10px; border-radius: 99px; font-size: 0.8rem; }
    .timestamp { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <h1>Live Dashboard</h1>
  <p class="subtitle">Synced from Claude · rohithb212/dashboard</p>
  <div class="card">
    <div class="stat"><span class="label">Status</span><span class="badge">Live</span></div>
    <div class="stat"><span class="label">Last Updated</span><span class="value" id="ts">Loading...</span></div>
    <div class="stat"><span class="label">Source</span><span class="value">Claude Artifact</span></div>
    <div class="stat"><span class="label">Repository</span><span class="value">rohithb212/dashboard</span></div>
    <div class="stat"><span class="label">Branch</span><span class="value">main</span></div>
  </div>
  <p class="timestamp">Auto-pushed on every artifact refresh</p>
  <script>
    document.getElementById('ts').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
